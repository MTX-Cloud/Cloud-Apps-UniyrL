name: Prod Deployment CI/CD

on:
  push:
    branches: [ "main" ] # Prod 배포 기준

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: cmdb-convert
  EKS_CLUSTER_NAME: test-cluster
  K8S_NAMESPACE: prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production # GitHub Environment를 통한 승인(Approval) 절차 적용
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd cmdb-convert
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy to Amazon EKS
      env:
        IMAGE_URI: ${{ steps.build-image.outputs.image }}
      run: |
        # 1. 먼저 기본 뼈대(매니페스트)를 배포합니다.
        kubectl apply -f k8s-manifest/prod-deployment.yaml
        
        # 2. sed 문자열 치환 대신, EKS 명령어로 컨테이너 이미지를 확실하게 교체합니다.
        kubectl set image deployment/cmdb-convert cmdb-convert=$IMAGE_URI -n ${{ env.K8S_NAMESPACE }}

    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/cmdb-convert -n ${{ env.K8S_NAMESPACE }}
